name: CI

# Runs the plugin test suite, including the craft drift guard
# (test/craft-sync.test.mjs, REQ-CRAFT-GUARD), which fails if the vendored
# authoring craft has drifted from the canonical rqml-skill source. The
# CLI-dependent plugin tests skip cleanly when the rqml toolchain is absent.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run tests
        run: node --test "test/**/*.test.mjs"
